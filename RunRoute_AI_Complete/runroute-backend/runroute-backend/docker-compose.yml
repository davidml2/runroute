version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: runroute_api
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: runroute_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: runroute
      POSTGRES_PASSWORD: runroute_secret
      POSTGRES_DB: runroute_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U runroute']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: runroute_redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  ai_service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: runroute_ai
    ports:
      - '8000:8000'
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
